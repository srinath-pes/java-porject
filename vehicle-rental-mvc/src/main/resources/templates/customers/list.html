<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Customers</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/header :: header"></div>
<div class="container">
    <div class="page-header"><h1>Customers</h1><a class="btn" th:href="@{/customers/new}">Add Customer</a></div>
    <table>
        <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>License</th><th>Actions</th></tr></thead>
        <tbody>
        <tr th:each="c : ${customers}">
            <td th:text="${c.id}"></td><td th:text="${c.fullName}"></td><td th:text="${c.email}"></td>
            <td th:text="${c.phone}"></td><td th:text="${c.licenseNumber}"></td>
            <td><a th:href="@{'/customers/edit/' + ${c.id}}">Edit</a> | <a th:href="@{'/customers/delete/' + ${c.id}}">Delete</a></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
