<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Vehicle Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/header :: header"></div>
<div class="container form-card">
    <h1>Vehicle Form</h1>
    <form th:action="@{/vehicles}" th:object="${vehicle}" method="post">
        <input type="hidden" th:field="*{id}">
        <label>Brand<input type="text" th:field="*{brand}"></label>
        <label>Model<input type="text" th:field="*{model}"></label>
        <label>Registration Number<input type="text" th:field="*{registrationNumber}"></label>
        <label>Type<input type="text" th:field="*{type}"></label>
        <label>Price Per Day<input type="number" step="0.01" th:field="*{pricePerDay}"></label>
        <label>Status<select th:field="*{status}"><option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option></select></label>
        <button class="btn" type="submit">Save</button>
    </form>
</div>
</body>
</html>
