<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Vehicles</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/header :: header"></div>
<div class="container">
    <div class="page-header"><h1>Vehicles</h1><a class="btn" th:href="@{/vehicles/new}">Add Vehicle</a></div>
    <table>
        <thead><tr><th>ID</th><th>Brand</th><th>Model</th><th>Reg No</th><th>Type</th><th>Price/Day</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>
        <tr th:each="v : ${vehicles}">
            <td th:text="${v.id}"></td><td th:text="${v.brand}"></td><td th:text="${v.model}"></td>
            <td th:text="${v.registrationNumber}"></td><td th:text="${v.type}"></td>
            <td th:text="${v.pricePerDay}"></td><td th:text="${v.status}"></td>
            <td><a th:href="@{'/vehicles/edit/' + ${v.id}}">Edit</a> | <a th:href="@{'/vehicles/delete/' + ${v.id}}">Delete</a></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
